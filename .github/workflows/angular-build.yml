name: Angular CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      # - name: Lint
      #   run: npm run lint --if-present

      # - name: Run unit tests
      #   run: npm test -- --watch=false --browsers=ChromeHeadless
      #   env:
      #     CI: true

      - name: Build application
        run: npm run build
        env:
          CI: true

      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: angular-dist
          path: dist/